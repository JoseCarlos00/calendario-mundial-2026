<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Calendario Mundial 2026</title>

	<link rel="stylesheet" href="public/style.css">
	<link rel="shortcut icon" href="public/favicon.png" type="image/png">
</head>

	<body>
		<div class="container-principal">
	
			<div class="container-title">
				<div class="container-fondo-imagen">
					<img src="./public/fondo.jpg" alt="fondo">
				</div>
	
				<h1>Calendario Mundial 2026</h1>
			</div>

			<div class="filters-container">
				<input type="search" name="group" id="group-filter" placeholder="Grupo..." style="margin-right: 1em; width: 80px;">
				<input type="search" name="country" id="country-filter" placeholder="Buscar país...">
			</div>

			<div class="table-container">
				<table class="simple-table">
					<thead class="simple-table-header">
						<tr>
							<th></th>
							<th>FECHA</th>
							<th>HORA</th>
							<th style="font-size: 0.84em;">GRUPO</th>
							<th></th>
							<th></th>
							<th></th>
							<th></th>
							<th></th>
							<th>Lugar</th>
							<th>Ciudad</th>
						</tr>
					</thead>
					<!-- <tr class="group-color"> -->
					<tbody></tbody>
				</table>
	
				<div id="no-results" class="no-results" style="display: none;">
					No se encontraron países que coincidan con tu búsqueda.
				</div>
			</div>
		</div>
	
		<script type="module" src="./src/index.js"></script>
	</body>

</html>
